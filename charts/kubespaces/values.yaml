# Default values: fully self-contained all-in-one install.
# Production: disable built-in postgresql/keycloak and point at external services.

nameOverride: ""
fullnameOverride: ""

api:
  # Set false for a headless / operator-only install (the operator provisions
  # tenants without the portal API — e.g. bring-your-own control-plane API).
  enabled: true
  image:
    repository: ghcr.io/kubespaces-io/api
    tag: ""            # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  # Extra environment variables merged into the container (name/value pairs).
  extraEnv: []

frontend:
  # Set false for a headless / operator-only install (no self-service portal).
  enabled: true
  image:
    repository: ghcr.io/kubespaces-io/frontend
    tag: ""            # defaults to .Chart.AppVersion
    pullPolicy: IfNotPresent
  replicas: 1
  containerPort: 3000  # Next.js standalone server listens here
  service:
    port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

# ---------------------------------------------------------------------------
# Built-in PostgreSQL (single-container StatefulSet, official image).
# Disable for production and configure externalDatabase instead.
# ---------------------------------------------------------------------------
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "18"
  database: kubespaces
  username: kubespaces
  # Password handling: leave empty to auto-generate a Secret on first install
  # (value is preserved across upgrades). Or set existingSecret with key
  # "password" to bring your own.
  password: ""
  existingSecret: ""
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

externalDatabase:
  host: ""
  port: 5432
  database: kubespaces
  username: kubespaces
  existingSecret: ""   # must contain key "password"

# ---------------------------------------------------------------------------
# Built-in Keycloak (official image, dev mode, realm auto-imported).
# Disable for production and configure oidc.* to bring your own IdP.
# ---------------------------------------------------------------------------
keycloak:
  enabled: true
  image:
    repository: quay.io/keycloak/keycloak
    tag: "26.7"
  # Bootstrap admin credentials (dev/all-in-one profile only).
  adminUser: admin
  adminPassword: ""    # empty = auto-generated Secret, key "admin-password"
  existingSecret: ""
  realm: kubespaces
  service:
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      memory: 1Gi

# Used when keycloak.enabled=false (bring your own OIDC provider),
# and as overrides when the built-in Keycloak is exposed on a public URL.
oidc:
  issuerUrl: ""        # e.g. https://auth.example.com/realms/kubespaces
  clientId: kubespaces

# ---------------------------------------------------------------------------
# Ingress: single entrypoint routing / -> frontend, /api -> api,
# /auth -> keycloak (when built-in Keycloak is enabled).
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  host: kubespaces.local
  annotations: {}
  tls: []
  # - secretName: kubespaces-tls
  #   hosts: [kubespaces.example.com]

# ---------------------------------------------------------------------------
# Operator (future component): reconciles Tenant custom resources.
# ---------------------------------------------------------------------------
operator:
  enabled: false
  image:
    repository: ghcr.io/kubespaces-io/operator
    tag: ""
    pullPolicy: IfNotPresent
  # Install the Tenant CRD with the chart (rendered from files/crd-tenants.yaml,
  # synced from operator/config/crd). It carries helm.sh/resource-policy: keep,
  # so it survives `helm uninstall` rather than cascade-deleting every tenant.
  # Set false when the CRD is managed out-of-band (e.g. GitOps / kubectl apply).
  installCRDs: true
  # vCluster chart source. Empty = operator defaults (the KubeSpaces OCI
  # mirror, pinned version baked into the operator release).
  vclusterChartRef: ""      # e.g. oci://ghcr.io/kubespaces-io/charts/vcluster
  vclusterChartVersion: ""  # e.g. 0.35.2
  # Tenant API exposure: the operator creates a per-tenant TLSRoute (SNI
  # passthrough) + ReferenceGrant on this Gateway and exposes each tenant's
  # API server at <tenant>.api.<domain>. Requires a Gateway with a TLS
  # passthrough listener and DNS (*.api.<domain> wildcard, or external-dns —
  # the operator annotates routes for it). All three of gateway.name,
  # gateway.namespace and domain must be set to enable.
  tenantApi:
    domain: ""              # e.g. kubespaces.example.com
    gateway:
      name: ""              # e.g. kubespaces-api
      namespace: ""         # e.g. kubespaces-system
      sectionName: ""       # optional TLS passthrough listener name
    externalDnsTarget: ""   # optional external-dns target override (on-prem IP)
  # Tenant app exposure: the operator adds a per-tenant HTTPS listener
  # (*.{tenant}.apps.<domain>, per-tenant cert-manager wildcard Certificate,
  # allowedRoutes locked to the tenant namespace) to this Gateway and enables
  # vCluster's native Gateway API HTTPRoute sync. Requires cert-manager and a
  # ClusterIssuer (DNS-01 for real certs; selfsigned works for evaluation).
  # All four fields must be set to enable.
  tenantApps:
    domain: ""              # e.g. kubespaces.example.com
    gateway:
      name: ""              # e.g. kubespaces-apps
      namespace: ""         # e.g. kubespaces-system
    clusterIssuer: ""       # e.g. letsencrypt-dns01 (cert-manager ClusterIssuer)

# ---------------------------------------------------------------------------
# Gateway API: expose the portal (and /api, /auth) as an HTTPRoute attached to
# an existing Gateway (e.g. the shared apps gateway). Alternative to ingress.
# The Gateway's allowedRoutes must permit routes from this namespace.
# ---------------------------------------------------------------------------
gatewayApi:
  enabled: false
  host: kubespaces.example.com
  gateway:
    name: kubespaces-apps
    namespace: kubespaces-system
    sectionName: ""   # optional listener name
