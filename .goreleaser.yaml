# CLI releases. One version line for the whole monorepo: tagging vX.Y.Z
# releases the kubespaces CLI binaries here and container images via build.yml.
version: 2
project_name: kubespaces

builds:
  - id: kubespaces
    dir: cli
    main: ./cmd/kubespaces
    binary: kubespaces
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.date={{ .CommitDate }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files: [LICENSE, NOTICE]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}

changelog:
  use: github
  groups:
    - title: "💥 Breaking"
      regexp: '^.*?(feat|fix)(\(.+\))?!:.+$'
      order: 0
    - title: "✨ Features"
      regexp: '^.*?feat(\(.+\))?:.+$'
      order: 1
    - title: "🐛 Fixes"
      regexp: '^.*?fix(\(.+\))?:.+$'
      order: 2
    - title: Other
      order: 999
  filters:
    exclude: ["^docs", "^chore", "^test", "^ci"]

brews:
  - name: kubespaces
    repository:
      owner: kubespaces-io
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://kubespaces.io
    description: CLI for KubeSpaces — the open control plane for virtual Kubernetes tenants
    license: Apache-2.0
    install: |
      bin.install "kubespaces"
    test: |
      system "#{bin}/kubespaces", "version"
