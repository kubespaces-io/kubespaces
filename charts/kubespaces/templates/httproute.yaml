{{- if .Values.gatewayApi.enabled }}
# Portal + API + auth on a shared Gateway (D17). Same path layout as the
# Ingress template; use one or the other.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "kubespaces.fullname" . }}
  labels:
    {{- include "kubespaces.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayApi.gateway.name }}
      namespace: {{ .Values.gatewayApi.gateway.namespace }}
      {{- with .Values.gatewayApi.gateway.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  hostnames:
    - {{ .Values.gatewayApi.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ include "kubespaces.fullname" . }}-api
          port: {{ .Values.api.service.port }}
    {{- if .Values.keycloak.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /auth
      backendRefs:
        - name: {{ include "kubespaces.fullname" . }}-keycloak
          port: {{ .Values.keycloak.service.port }}
    {{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "kubespaces.fullname" . }}-frontend
          port: {{ .Values.frontend.service.port }}
{{- end }}
