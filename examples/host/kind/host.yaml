# Host preparation for local reachable tenants on kind (see
# docs/getting-started/local-kind.md). This is the kind-specific counterpart of
# examples/host/gateway-api.yaml + gateway-apps.yaml: same two shared Gateways,
# but with the Envoy services pinned to fixed NodePorts so kind's static port
# mappings (kind-cluster.yaml) can reach them, and hostnames set to nip.io.
#
# Two GatewayClasses (one per gateway) each carry their own EnvoyProxy: this
# keeps each service's NodePort patch isolated (a shared GatewayClass patch
# would inject the other gateway's ports into both services).
#
#   kubectl apply -f host.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: kubespaces-system
---
# Evaluation-only self-signed issuer (per-tenant apps wildcard certs). For
# anything real use a DNS-01 ClusterIssuer — wildcard certs need DNS-01.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
---
# API gateway proxy: NodePort, port 443 pinned to 30443.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: eproxy-api
  namespace: kubespaces-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - port: 443
                  nodePort: 30443
---
# Apps gateway proxy: NodePort, 80 -> 30080 and 443 -> 30444.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: eproxy-apps
  namespace: kubespaces-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        type: NodePort
        patch:
          type: StrategicMerge
          value:
            spec:
              ports:
                - port: 80
                  nodePort: 30080
                - port: 443
                  nodePort: 30444
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-api
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: eproxy-api
    namespace: kubespaces-system
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-apps
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: eproxy-apps
    namespace: kubespaces-system
---
# Shared tenant API gateway (TLS passthrough). The operator attaches one
# TLSRoute per tenant here. allowedRoutes: Same keeps tenant namespaces from
# ever attaching a route to the API gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kubespaces-api
  namespace: kubespaces-system
spec:
  gatewayClassName: envoy-api
  listeners:
    - name: apipassthrough
      hostname: "*.api.127.0.0.1.nip.io"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
      allowedRoutes:
        namespaces:
          from: Same
---
# Static self-signed cert whose only job is to make port 443 exist on the apps
# service from the start, so NodePort 30444 is pinned before the first tenant
# listener appears (kind's :8443 mapping is then valid immediately).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: apps-base
  namespace: kubespaces-system
spec:
  secretName: apps-base-tls
  dnsNames:
    - base.apps.127.0.0.1.nip.io
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
---
# Shared tenant apps gateway (TLS terminate). The operator adds one listener
# per tenant (t-<tenant>, *.<tenant>.apps.<domain>, allowedRoutes locked to the
# tenant namespace). If you manage this Gateway with GitOps, ignore drift on
# spec.listeners or the reconciler will fight the operator.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: kubespaces-apps
  namespace: kubespaces-system
spec:
  gatewayClassName: envoy-apps
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https-base
      hostname: base.apps.127.0.0.1.nip.io
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: apps-base-tls
      allowedRoutes:
        namespaces:
          from: Same
