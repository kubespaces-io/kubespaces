# Test profile for the kubespaces-one GKE cluster
# (kubectl context: gke_infra-429913_europe-west1-b_kubespaces-one).
# Mutable tags during development -> always pull.
api:
  image:
    pullPolicy: Always
frontend:
  image:
    pullPolicy: Always
operator:
  enabled: true
  image:
    pullPolicy: Always
  # Tenant API exposure through the Envoy Gateway on this cluster; DNS:
  # *.api.gke.kubespaces.io -> the Gateway's LoadBalancer IP.
  tenantApi:
    domain: gke.kubespaces.io
    gateway:
      name: kubespaces-api
      namespace: kubespaces-system
      sectionName: apipassthrough
  # Apps exposure: *.{tenant}.apps.gke.kubespaces.io via the apps Gateway;
  # self-signed issuer (evaluation) — DNS: *.apps.gke.kubespaces.io -> apps
  # Gateway LB IP.
  tenantApps:
    domain: gke.kubespaces.io
    gateway:
      name: kubespaces-apps
      namespace: kubespaces-system
    clusterIssuer: selfsigned
postgresql:
  enabled: true
  persistence:
    enabled: true
    size: 8Gi
    storageClass: standard-rwo

keycloak:
  enabled: true

ingress:
  enabled: false   # flip on once a static IP / DNS is set up for testing
