name: Feature request
description: Propose an improvement or new capability
labels: [enhancement, triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What can't you do today? Describe the situation, not the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How you'd like it to work (CLI/portal/CRD sketches welcome)
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
