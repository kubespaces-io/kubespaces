name: Release spacectl

# Requires the TAP_GITHUB_TOKEN secret: a fine-grained PAT with contents:write
# on kubespaces-io/homebrew-tap (GITHUB_TOKEN cannot push cross-repo).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write   # cosign keyless signing

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: spacectl/go.mod
          cache-dependency-path: spacectl/go.sum
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
