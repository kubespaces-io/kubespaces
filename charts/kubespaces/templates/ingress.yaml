{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "kubespaces.fullname" . }}
  labels:
    {{- include "kubespaces.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "kubespaces.fullname" . }}-api
                port:
                  name: http
          {{- if .Values.keycloak.enabled }}
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "kubespaces.fullname" . }}-keycloak
                port:
                  name: http
          {{- end }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "kubespaces.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
